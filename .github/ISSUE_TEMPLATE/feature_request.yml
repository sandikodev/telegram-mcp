name: Feature Request
description: Suggest a new tool or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: "I want to be able to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      placeholder: "Add a new tool telegram_xxx that..."
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Which mode would this apply to?
      options:
        - MTProto only
        - Bot API only
        - Both modes
        - Not applicable

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
